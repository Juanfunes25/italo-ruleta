services:
  - type: web
    name: italo-mantenimiento
    runtime: node
    rootDir: mantenimiento
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NOTIFY_TOKEN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: NOTIFY_TO
        sync: false
      - key: APP_URL
        sync: false
